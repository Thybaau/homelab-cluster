apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard-home
  namespace: argocd
  labels:
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/component: networking
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.gabe565.com
    targetRevision: 0.3.25
    chart: adguard-home
    helm:
      values: |
        env:
          TZ: "Europe/Paris"

        # Configuration DNS rewrites
        config: |
          dns:
            upstream_dns:
              - https://1.1.1.1/dns-query
              - https://1.0.0.1/dns-query
            bootstrap_dns:
              - 1.1.1.1
              - 1.0.0.1
            rewrites:
              - domain: "adguard.home"
                answer: "192.168.1.151"
              - domain: "homepage.home"
                answer: "192.168.1.151"
              - domain: "valhafin.home"
                answer: "192.168.1.151"
              - domain: "grafana.home"
                answer: "192.168.1.151"

        service:
          main:
            type: ClusterIP
            ports:
              http:
                port: 3000
          dns-tcp:
            enabled: true
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: "192.168.1.152"
            ports:
              dns-tcp:
                enabled: true
                port: 53
                protocol: TCP
          dns-udp:
            enabled: true
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: "192.168.1.152"
            ports:
              dns-udp:
                enabled: true
                port: 53
                protocol: UDP

        ingress:
          main:
            enabled: true
            hosts:
              - host: adguard.home
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      name: adguard-home
                      port: 3000

        persistence:
          data:
            enabled: true
            size: 5Gi
            storageClass: "local-path"
            accessMode: ReadWriteOnce
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
