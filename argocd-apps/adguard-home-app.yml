apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: adguard-home
  namespace: argocd
  labels:
    app.kubernetes.io/name: adguard-home
    app.kubernetes.io/component: networking
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.gabe565.com
    targetRevision: 0.3.25
    chart: adguard-home
    helm:
      values: |
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet

        nodeSelector:
          kubernetes.io/hostname: k3s-master

        env:
          TZ: "Europe/Paris"

        # Configuration DNS rewrites
        config: |
          dns:
            upstream_dns:
              - "https://dns10.quad9.net/dns-query"
              - "https://dns.cloudflare.com/dns-query"
          filtering:
            rewrites:
              - domain: "adguard.home"
                answer: "192.168.1.151"
              - domain: "homepage.home"
                answer: "192.168.1.151"
              - domain: "valhafin.home"
                answer: "192.168.1.151"
              - domain: "grafana.home"
                answer: "192.168.1.151"
          dhcp:
            enabled: true
            interface_name: eth0
            local_domain_name: lan
            dhcpv4:
              gateway_ip: 192.168.1.1
              subnet_mask: 255.255.255.0
              range_start: 192.168.1.20
              range_end: 192.168.1.100
              lease_duration: 86400
              icmp_timeout_msec: 1000
              options:
                - "6 192.168.1.152"
            dhcpv6:
              range_start: ""
              lease_duration: 86400
              ra_slaac_only: false
              ra_allow_slaac: false

        service:
          main:
            type: ClusterIP
            ports:
              http:
                port: 3000
          dns-tcp:
            enabled: true
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: "192.168.1.152"
            ports:
              dns-tcp:
                enabled: true
                port: 53
                protocol: TCP
          dns-udp:
            enabled: true
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: "192.168.1.152"
            ports:
              dns-udp:
                enabled: true
                port: 53
                protocol: UDP

        ingress:
          main:
            enabled: true
            hosts:
              - host: adguard.home
                paths:
                  - path: /
                    pathType: Prefix
                    service:
                      name: adguard-home
                      port: 3000

        persistence:
          config:
            enabled: true
            size: 1Gi
            storageClass: "local-path"
            accessMode: ReadWriteOnce
          data:
            enabled: true
            size: 5Gi
            storageClass: "local-path"
            accessMode: ReadWriteOnce
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
