# Configuration globale
global:
  namespace: networking

# Configuration de l'application
app:
  replicaCount: 1

  image:
    repository: cloudflare/cloudflared
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

sealedSecret:
  enabled: true
  encryptedData:
    TUNNEL_TOKEN: ""
