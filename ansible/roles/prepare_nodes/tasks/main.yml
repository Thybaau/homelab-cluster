---
# Main tasks for prepare_nodes role
# This role prepares Ubuntu 24.04 nodes for k3s installation

- name: Update APT cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  register: apt_update
  retries: 3
  delay: 5
  until: apt_update is success

- name: Upgrade system packages
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
  register: apt_upgrade
  retries: 3
  delay: 5
  until: apt_upgrade is success

- name: Install required dependencies for k3s
  apt:
    name: "{{ required_packages }}"
    state: present
    update_cache: no
  register: pkg_install
  retries: 3
  delay: 5
  until: pkg_install is success

- name: Load kernel modules
  modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ kernel_modules }}"

- name: Ensure kernel modules load on boot
  lineinfile:
    path: /etc/modules-load.d/k3s.conf
    line: "{{ item }}"
    create: yes
    mode: '0644'
  loop: "{{ kernel_modules }}"

- name: Configure sysctl parameters for Kubernetes
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: yes
    reload: yes
  loop: "{{ sysctl_config | dict2items }}"

- name: Disable swap immediately
  command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: false

- name: Disable swap permanently in /etc/fstab
  lineinfile:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    line: '# \1'
    backrefs: yes
    state: present
  register: fstab_swap

- name: Check if UFW is installed
  command: which ufw
  register: ufw_check
  failed_when: false
  changed_when: false

- name: Set UFW default policies
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: 'outgoing', policy: 'allow' }
    - { direction: 'incoming', policy: 'deny' }
  when: ufw_check.rc == 0

- name: Allow SSH
  ufw:
    rule: allow
    port: '22'
    proto: tcp
  when: ufw_check.rc == 0

- name: Allow UFW K3s TCP Ports
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_ports_tcp }}"
  when: ufw_check.rc == 0

- name: Allow UFW K3s UDP Ports
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_ports_udp }}"
  when: ufw_check.rc == 0

- name: Enable UFW if installed
  ufw:
    state: enabled
  when: ufw_check.rc == 0

- name: Create resolved.conf.d directory
  file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: '0755'
  when: inventory_hostname in groups['k3s_workers']

- name: Disable systemd-resolved DNS stub listener
  copy:
    dest: /etc/systemd/resolved.conf.d/no-stub.conf
    content: |
      [Resolve]
      DNSStubListener=no
    mode: '0644'
  register: resolved_stub
  when: inventory_hostname in groups['k3s_workers']

- name: Remove resolv.conf symlink
  file:
    path: /etc/resolv.conf
    state: absent
  when: inventory_hostname in groups['k3s_workers']

- name: Write static resolv.conf
  copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 1.1.1.1
      nameserver 8.8.8.8
      options edns0 trust-ad
      search tailb119d8.ts.net
    mode: '0644'
  when: inventory_hostname in groups['k3s_workers']

- name: Restart systemd-resolved after stub disable
  systemd:
    name: systemd-resolved
    state: restarted
  when:
    - inventory_hostname in groups['k3s_workers']
    - resolved_stub is changed
